<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <title>AI Chat | LIU Xinyu</title>
    <meta name="title" content="AI Chat | LIU Xinyu">
    <meta name="description" content="Chat with AI about design, engineering, or learn more about LIU Xinyu's background and experience.">
    <meta name="keywords" content="AI Chat, Design, Engineering, LIU Xinyu, Product Manager">
    <meta name="author" content="LIU Xinyu">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://halo-welt.github.io/Personal_Website4myself/chat.html">
    <meta property="og:title" content="AI Chat | LIU Xinyu">
    <meta property="og:description" content="Chat with AI about design, engineering, or learn more about LIU Xinyu">
    <meta property="og:image" content="images/og-image.svg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://halo-welt.github.io/Personal_Website4myself/chat.html">
    <meta property="twitter:title" content="AI Chat | LIU Xinyu">
    <meta property="twitter:description" content="Chat with AI about design, engineering, or learn more about LIU Xinyu">
    <meta property="twitter:image" content="images/og-image.svg">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://halo-welt.github.io/Personal_Website4myself/chat.html">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="apple-touch-icon" href="images/favicon.svg">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav id="navbar" class="navbar" role="navigation" aria-label="Main navigation"></nav>

    <main id="main-content" class="chat-content">
        <div class="chat-container">
            <!-- Left Panel: Mode Selection & Info -->
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <h2><i class="fas fa-robot"></i> AI Chat</h2>
                    <p>Choose a mode to start</p>
                </div>

                <div class="mode-selector" role="group" aria-label="Chat mode selection">
                    <button class="mode-card active" data-mode="consultant" aria-label="Professional mode: Design and engineering expert">
                        <div class="mode-icon">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <div class="mode-info">
                            <h3>Professional</h3>
                            <p>Design + Engineering Expert</p>
                        </div>
                    </button>

                    <button class="mode-card" data-mode="resume" aria-label="Resume mode: Learn about Liu Xinyu">
                        <div class="mode-icon">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <div class="mode-info">
                            <h3>Resume</h3>
                            <p>About Liu Xinyu</p>
                        </div>
                    </button>
                </div>

                <div class="chat-tips">
                    <h4><i class="fas fa-lightbulb"></i> Tips</h4>
                    <ul>
                        <li>Press Enter to send</li>
                        <li>Shift + Enter for new line</li>
                        <li>Click stop button to abort</li>
                    </ul>
                </div>
            </div>

            <!-- Right Panel: Chat Area -->
            <div class="chat-main">
                <div class="chat-header">
                    <h1 id="chat-title">Professional Mode</h1>
                    <p id="mode-description">Design + Engineering Expert</p>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be added here dynamically -->
                </div>
                <div class="chat-input-container">
                    <label for="chat-input" class="visually-hidden">Type your message</label>
                    <textarea id="chat-input" placeholder="Type your message here..." rows="1" aria-label="Type your message"></textarea>
                    <button id="send-button" aria-label="Send message">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer" role="contentinfo"></footer>

    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
