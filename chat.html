<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with AI | Desigineer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DESIGINEER</div>
        <div class="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="resume.html">Resume</a></li>
            <li><a href="github.html">GitHub</a></li>
            <li><a href="chat.html" class="active">Chat</a></li>
            <li><a href="cool.html">Cool</a></li>
        </ul>
    </nav>

    <main class="chat-content">
        <div class="chat-container">
            <!-- Left Panel: Mode Selection & Info -->
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <h2><i class="fas fa-robot"></i> AI Chat</h2>
                    <p>Choose a mode to start</p>
                </div>

                <div class="mode-selector">
                    <button class="mode-card active" data-mode="consultant">
                        <div class="mode-icon">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <div class="mode-info">
                            <h3>Professional</h3>
                            <p>Design + Engineering Expert</p>
                        </div>
                    </button>

                    <button class="mode-card" data-mode="resume">
                        <div class="mode-icon">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <div class="mode-info">
                            <h3>Resume</h3>
                            <p>About Liu Xinyu</p>
                        </div>
                    </button>
                </div>

                <div class="chat-tips">
                    <h4><i class="fas fa-lightbulb"></i> Tips</h4>
                    <ul>
                        <li>Press Enter to send</li>
                        <li>Shift + Enter for new line</li>
                        <li>Click stop button to abort</li>
                    </ul>
                </div>
            </div>

            <!-- Right Panel: Chat Area -->
            <div class="chat-main">
                <div class="chat-header">
                    <h1 id="chat-title">Professional Mode</h1>
                    <p id="mode-description">Design + Engineering Expert</p>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be added here dynamically -->
                </div>
                <div class="chat-input-container">
                    <textarea id="chat-input" placeholder="Type your message here..." rows="1"></textarea>
                    <button id="send-button">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-links">
            <a href="#">
                <i class="fab fa-weixin"></i>
                <div class="wechat-qr">
                    <img src="images/Wechat.jpg" alt="WeChat QR Code">
                </div>
            </a>
            <a href="https://www.xiaohongshu.com/user/profile/5e4ae8280000000001007545" target="_blank">
                <i class="fas fa-book"></i>
            </a>
            <a href="https://github.com/Halo-Welt" target="_blank">
                <i class="fab fa-github"></i>
            </a>
        </div>
        <p>&copy; 2025 LIU Xinyu. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
